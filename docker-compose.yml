version: '3.9'

services:
  # MongoDB
  mongo:
    image: mongo:7
    container_name: promo_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-promo_manager}
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ 'CMD', 'mongosh', '--eval', "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: promo_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CH_USER:-admin}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-secret}
      CLICKHOUSE_DB: ${CH_DB:-promo_analytics}
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: [ 'CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8123/ping' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis
  redis:
    image: redis:7-alpine
    container_name: promo_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-secret}', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Back
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promo_backend
    restart: unless-stopped
    env_file:
      - backend/.env
    ports:
      - '3000:3000'
    depends_on:
      mongo:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD', 'node', '-e', "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Front
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: promo_frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
  clickhouse_data:
  redis_data:
